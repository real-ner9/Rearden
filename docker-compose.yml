services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: rearden-db
    environment:
      POSTGRES_USER: rearden
      POSTGRES_PASSWORD: rearden
      POSTGRES_DB: rearden
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: rearden-minio
    environment:
      MINIO_ROOT_USER: rearden
      MINIO_ROOT_PASSWORD: reardenpass
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set rearden http://minio:9000 rearden reardenpass;
      mc mb rearden/rearden-media --ignore-existing;
      mc anonymous set download rearden/rearden-media;
      exit 0;
      "

volumes:
  pgdata:
  minio-data:
